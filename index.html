<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian Health</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           MERIDIAN HEALTH — Design tokens
           Color: deep teal-pine primary, warm paper bg,
           terracotta accent, sage support
           Type: Fraunces (display) / Inter (body) / JetBrains Mono (data)
        ============================================ */
        
        :root {
          --ink: #2A2622;
          --paper: #FAF7F2;
          --sand: #E8DCC8;
          --sand-deep: #DCCBAE;
          --pine: #0F3D3E;
          --pine-light: #18534F;
          --pine-pale: #E4EDE8;
          --terracotta: #C75C3D;
          --terracotta-dark: #A8472C;
          --sage: #5A8C7A;
          --line: rgba(15, 61, 62, 0.14);
        
          --font-display: 'Fraunces', serif;
          --font-body: 'Inter', sans-serif;
          --font-mono: 'JetBrains Mono', monospace;
        
          --radius-sm: 8px;
          --radius-md: 14px;
          --radius-lg: 24px;
          --shadow-card: 0 2px 4px rgba(42,38,34,0.04), 0 12px 28px rgba(15,61,62,0.08);
          --shadow-pop: 0 8px 16px rgba(42,38,34,0.06), 0 24px 48px rgba(15,61,62,0.14);
          --container: 1180px;
        }
        
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after { 
            animation-duration: 0.001ms !important; 
            animation-iteration-count: 1 !important; 
            transition-duration: 0.001ms !important;
            scroll-behavior: auto !important; 
          }
        }
        
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
          margin: 0;
          background: var(--paper);
          color: var(--ink);
          font-family: var(--font-body);
          font-size: 16px;
          line-height: 1.55;
          -webkit-font-smoothing: antialiased;
        }
        img { max-width: 100%; display: block; }
        a { color: inherit; text-decoration: none; }
        ul { margin: 0; padding: 0; }
        button { font-family: inherit; cursor: pointer; }
        :focus-visible { 
          outline: 2.5px solid var(--terracotta); 
          outline-offset: 3px;
          border-radius: 4px; 
        }
        
        .container {
          width: 100%;
          max-width: var(--container);
          margin: 0 auto;
          padding: 0 28px;
        }
        .mono { 
          font-family: var(--font-mono);
          letter-spacing: -0.02em; 
        }
        
        /* ---------- Typography scale ---------- */
        .eyebrow {
          font-family: var(--font-mono);
          font-size: 12.5px;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--terracotta-dark);
          margin: 0 0 14px;
          font-weight: 500;
        }
        .eyebrow.center { text-align: center; }
        
        .display-xl {
          font-family: var(--font-display);
          font-weight: 600;
          font-size: clamp(38px, 5.4vw, 68px);
          line-height: 1.05;
          letter-spacing: -0.01em;
          margin: 0 0 22px;
        }
        .display-xl em {
          font-style: italic;
          font-weight: 500;
          color: var(--pine);
        }
        .display-lg {
          font-family: var(--font-display);
          font-weight: 600;
          font-size: clamp(28px, 3.4vw, 42px);
          line-height: 1.12;
          letter-spacing: -0.01em;
          margin: 0 0 18px;
        }
        .display-lg.center { 
          text-align: center; 
          max-width: 640px; 
          margin-inline: auto; 
          margin-bottom: 56px; 
        }
        
        .hero-sub {
          font-size: 18px;
          color: rgba(42,38,34,0.72);
          max-width: 480px;
          margin: 0 0 32px;
        }
        
        /* ---------- Buttons ---------- */
        .btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          padding: 13px 24px;
          border-radius: 999px;
          font-weight: 600;
          font-size: 15px;
          border: 1.5px solid transparent;
          transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease;
          white-space: nowrap;
        }
        .btn-primary { 
          background: var(--terracotta);
          color: #fff; 
          box-shadow: 0 4px 14px rgba(199,92,61,0.32); 
        }
        .btn-primary:hover { 
          background: var(--terracotta-dark); 
          transform: translateY(-1px); 
        }
        .btn-outline { 
          background: transparent; 
          border-color: var(--pine);
          color: var(--pine); 
        }
        .btn-outline:hover { 
          background: var(--pine); 
          color: #fff; 
        }
        .btn-ghost { 
          background: transparent; 
          color: var(--ink); 
          padding: 13px 16px;
        }
        .btn-ghost:hover { color: var(--terracotta-dark); }
        .btn-lg { padding: 16px 30px; font-size: 16px; }
        .btn-block { width: 100%; }
        
        /* ============ HEADER ============ */
        .site-header {
          position: sticky;
          top: 0;
          z-index: 50;
          background: rgba(250,247,242,0.88);
          backdrop-filter: blur(10px);
          border-bottom: 1px solid var(--line);
        }
        .nav-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          height: 76px;
          gap: 24px;
        }
        .brand {
          display: flex;
          align-items: center;
          gap: 10px;
          font-family: var(--font-display);
          font-weight: 600;
          font-size: 20px;
          color: var(--pine);
        }
        .brand-mark { color: var(--terracotta); display: flex; }
        .main-nav { 
          display: flex; gap: 30px; font-weight: 500; 
          font-size: 15px; flex: 1; justify-content: center;
        }
        .main-nav a { opacity: 0.78; transition: opacity 0.15s, color 0.15s; }
        .main-nav a:hover { opacity: 1; color: var(--terracotta-dark); }
        .nav-cta { display: flex; align-items: center; gap: 6px; }
        .nav-toggle { 
          display: none; flex-direction: column; gap: 5px; 
          background: none; border: none; padding: 8px; 
        }
        .nav-toggle span { 
          width: 22px; height: 2px; 
          background: var(--ink); border-radius: 2px;
        }
        
        /* ============ HERO ============ */
        .hero { position: relative; overflow: hidden; padding-top: 64px; }
        .hero-grid {
          display: grid;
          grid-template-columns: 1.05fr 0.95fr;
          gap: 48px;
          align-items: center;
          padding-bottom: 72px;
        }
        .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 36px; }
        .trust-row { display: flex; align-items: center; gap: 14px; font-size: 14.5px; color: rgba(42,38,34,0.7); }
        .avatars { display: flex; }
        .avatar {
          width: 32px; height: 32px;
          border-radius: 50%;
          border: 2.5px solid var(--paper);
          margin-left: -10px;
          background: linear-gradient(135deg, var(--sage), var(--pine));
        }
        .avatars .avatar:first-child { margin-left: 0; }
        .avatar.a2 { background: linear-gradient(135deg, var(--terracotta), var(--sand-deep)); }
        .avatar.a3 { background: linear-gradient(135deg, var(--pine-light), var(--sage)); }
        .avatar.a4 { background: linear-gradient(135deg, var(--sand-deep), var(--terracotta)); }
        
        /* --- Hero visual: video call card --- */
        .hero-visual { position: relative; display: flex; justify-content: center; }
        .call-card {
          width: 100%;
          max-width: 380px;
          background: var(--pine);
          border-radius: var(--radius-lg);
          box-shadow: var(--shadow-pop);
          overflow: hidden;
          color: #fff;
          position: relative;
        }
        .call-card-top {
          display: flex; align-items: center; gap: 8px;
          padding: 16px 20px;
          font-size: 13px;
          font-family: var(--font-mono);
          background: rgba(255,255,255,0.06);
          border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .rec-dot {
          width: 8px; height: 8px; border-radius: 50%; background: #FF6B5B;
          animation: blink 1.6s infinite;
        }
        .call-timer { margin-left: auto; opacity: 0.7; }
        .call-card-body {
          padding: 48px 20px 40px;
          display: flex; flex-direction: column; align-items: center;
          gap: 16px;
          background: radial-gradient(circle at 50% 30%, rgba(90,140,122,0.25), transparent 70%);
        }
        .doctor-feed { position: relative; width: 128px; height: 128px; display: flex; align-items: center; justify-content: center; }
        .ring {
          position: absolute; inset: 0; border-radius: 50%;
          border: 1.5px solid rgba(255,255,255,0.18);
          animation: ripple 2.8s ease-out infinite;
        }
        .ring2 { animation-delay: 1.4s; }
        .doc-avatar {
          width: 92px; height: 92px; border-radius: 50%;
          background: linear-gradient(135deg, var(--sage), var(--pine-light));
          display: flex; align-items: center; justify-content: center;
          font-family: var(--font-display); font-weight: 600; font-size: 26px;
          border: 3px solid rgba(255,255,255,0.25);
          z-index: 1;
        }
        .doc-feed-name { font-size: 15px; font-weight: 600; text-align: center; }
        .doc-feed-name span { display: block; font-size: 12.5px; font-weight: 400; opacity: 0.65; margin-top: 2px; }
        .call-card-controls { display: flex; justify-content: center; gap: 14px; padding: 18px; background: rgba(0,0,0,0.18); }
        .ctrl { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.14); display: inline-block; }
        .ctrl-end { background: #E2483A; width: 50px; border-radius: 19px; }
        
        .float-chip {
          position: absolute;
          background: #fff;
          border-radius: var(--radius-sm);
          padding: 10px 14px;
          box-shadow: var(--shadow-card);
          display: flex; flex-direction: column; gap: 2px;
          font-size: 13px;
        }
        .chip-label { font-size: 11px; color: rgba(42,38,34,0.55); }
        .chip-value { font-weight: 600; }
        .chip-value small { font-weight: 400; font-size: 11px; color: rgba(42,38,34,0.5); }
        .chip-vitals { top: -10px; right: -6px; }
        .chip-rx { bottom: 10px; left: -22px; }
        .chip-rx .chip-value { color: var(--sage); }
        
        @keyframes ripple { 0% { transform: scale(0.85); opacity: 0.9; } 100% { transform: scale(1.6); opacity: 0; } }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
        
        /* --- Vitals strip --- */
        .vitals-strip { background: var(--pine); color: #fff; }
        .vitals-inner {
          display: flex; flex-wrap: wrap; gap: 32px;
          padding: 18px 28px; justify-content: space-between;
          font-size: 13.5px; opacity: 0.92;
        }
        .vital { display: flex; align-items: center; gap: 9px; white-space: nowrap; }
        .vital-num { font-weight: 600; color: #fff; }
        .vital-dot { width: 7px; height: 7px; border-radius: 50%; background: #79D6A8; }
        .vital-dot.pulse { animation: blink 1.8s infinite; }
        
        /* ============ SECTIONS ============ */
        .section { padding: 96px 0; }
        .section-tint { background: var(--pine-pale); }
        .section-head-row {
          display: flex; justify-content: space-between; align-items: flex-end;
          gap: 24px; margin-bottom: 48px; flex-wrap: wrap;
        }
        .section-head-row .display-lg { margin-bottom: 0; max-width: 480px; }
        
        /* --- Steps --- */
        .steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
        .step-card {
          background: #fff;
          border: 1px solid var(--line);
          border-radius: var(--radius-md);
          padding: 28px 24px;
        }
        .step-tag { display: inline-block; font-size: 12px; color: var(--terracotta-dark); margin-bottom: 14px; }
        .step-card h3 { font-family: var(--font-display); font-weight: 600; font-size: 19px; margin: 0 0 10px; }
        .step-card p { font-size: 14.5px; color: rgba(42,38,34,0.68); margin: 0; }
        
        /* --- Filter pills --- */
        .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill {
          border: 1.5px solid var(--line);
          background: #fff;
          padding: 9px 18px;
          border-radius: 999px;
          font-size: 13.5px; font-weight: 500;
          transition: all 0.15s;
        }
        .pill:hover { border-color: var(--pine); }
        .pill.is-active { background: var(--pine); color: #fff; border-color: var(--pine); }
        
        /* --- Doctor cards (chart motif) --- */
        .doctor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
        .doctor-card {
          background: #fff;
          border: 1px solid var(--line);
          border-radius: var(--radius-md);
          padding: 24px;
          position: relative;
          box-shadow: var(--shadow-card);
          transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .doctor-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-pop); }
        .chart-tab {
          position: absolute; top: -10px; left: 24px;
          background: var(--sand);
          color: var(--terracotta-dark);
          font-size: 11px; font-weight: 600;
          padding: 3px 10px; border-radius: 5px;
        }
        .doctor-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin: 8px 0 16px; }
        .doctor-photo {
          width: 54px; height: 54px; border-radius: 50%;
          display: flex; align-items: center; justify-content: center;
          font-family: var(--font-display); font-weight: 600; font-size: 17px; color: #fff;
        }
        .doctor-photo.small { width: 40px; height: 40px; font-size: 14px; }
        .ph1 { background: linear-gradient(135deg, var(--pine), var(--sage)); }
        .ph2 { background: linear-gradient(135deg, var(--terracotta), var(--sand-deep)); }
        .ph3 { background: linear-gradient(135deg, var(--sage), var(--pine-light)); }
        .ph4 { background: linear-gradient(135deg, var(--pine-light), var(--terracotta-dark)); }
        .ph5 { background: linear-gradient(135deg, var(--sand-deep), var(--pine)); }
        .ph6 { background: linear-gradient(135deg, var(--terracotta-dark), var(--sage)); }
        
        /* ============ Scroll reveal ============ */
        .fade-up { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .fade-up.is-visible { opacity: 1; transform: translateY(0); }
        
        /* ============ RESPONSIVE ============ */
        @media (max-width: 1020px) {
          .doctor-grid { grid-template-columns: repeat(2, 1fr); }
          .steps-grid { grid-template-columns: repeat(2, 1fr); }
          .pricing-grid { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }
          .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px 24px; }
        }
        
        @media (max-width: 880px) {
          .main-nav { display: none; }
          .nav-toggle { display: flex; }
          .hero-grid { grid-template-columns: 1fr; }
          .hero-visual { margin-top: 12px; }
        }
    </style>
</head>
<body>

    <script>
        // ============ Mobile nav toggle ============
        const navToggle = document.getElementById('navToggle');
        const mainNav = document.querySelector('.main-nav');
        if (navToggle) {
          navToggle.addEventListener('click', () => {
            const isOpen = mainNav.classList.toggle('is-open');
            navToggle.setAttribute('aria-expanded', isOpen);
          });
        }
        
        // ============ Doctor specialty filter ============
        const pills = document.querySelectorAll('.pill');
        const doctorCards = document.querySelectorAll('.doctor-card');
        pills.forEach(pill => {
          pill.addEventListener('click', () => {
            pills.forEach(p => p.classList.remove('is-active'));
            pill.classList.add('is-active');
            const filter = pill.dataset.filter;
            doctorCards.forEach(card => {
              const match = filter === 'all' || card.dataset.spec === filter;
              card.style.display = match ? '' : 'none';
            });
          });
        });
        
        // ============ File upload (booking form) ============
        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const fileList = document.getElementById('fileList');
        let selectedFiles = [];
        
        function renderFileList() {
          fileList.innerHTML = '';
          selectedFiles.forEach((file, idx) => {
            const chip = document.createElement('div');
            chip.className = 'file-chip';
            const sizeKb = (file.size / 1024).toFixed(0);
            chip.innerHTML = `<span>📄 ${escapeHtml(file.name)} <span style="opacity:.5">(${sizeKb} KB)</span></span>`;
            
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.textContent = 'Remove';
            removeBtn.addEventListener('click', () => {
              selectedFiles.splice(idx, 1);
              renderFileList();
            });
            
            chip.appendChild(removeBtn);
            fileList.appendChild(chip);
          });
        }
        
        function escapeHtml(str) {
          const div = document.createElement('div');
          div.textContent = str;
          return div.innerHTML;
        }
        
        if (fileInput) {
          fileInput.addEventListener('change', (e) => {
            selectedFiles = selectedFiles.concat(Array.from(e.target.files));
            renderFileList();
          });
        
          ['dragenter', 'dragover'].forEach(evt => {
            uploadZone.addEventListener(evt, (e) => {
              e.preventDefault();
              uploadZone.classList.add('is-dragover');
            });
          });
        
          ['dragleave', 'drop'].forEach(evt => {
            uploadZone.addEventListener(evt, (e) => {
              e.preventDefault();
              uploadZone.classList.remove('is-dragover');
            });
          });
        
          uploadZone.addEventListener('drop', (e) => {
            const dropped = Array.from(e.dataTransfer.files);
            selectedFiles = selectedFiles.concat(dropped);
            renderFileList();
          });
        }
        
        // ============ Booking form submit (demo behavior) ============
        const bookingForm = document.getElementById('bookingForm');
        if (bookingForm) {
          bookingForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = bookingForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Processing...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
              setTimeout(() => {
                alert(`Booking submitted!\nFiles attached: ${selectedFiles.length}\n\n(This is a static demo — no real payment or booking was processed.)`);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
              }, 700);
            }, 900);
          });
        }
        
        // ============ Scroll reveal for step cards ============
        const revealEls = document.querySelectorAll('.fade-up');
        if ('IntersectionObserver' in window && revealEls.length) {
          const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
              if (entry.isIntersecting) {
                setTimeout(() => entry.target.classList.add('is-visible'), i * 80);
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.15 });
          revealEls.forEach(el => observer.observe(el));
        } else {
          revealEls.forEach(el => el.classList.add('is-visible'));
        }
        
        // ============ Hero call timer (cosmetic) ============
        const callTimer = document.getElementById('callTimer');
        if (callTimer) {
          let seconds = 252; // 04:12
          setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            callTimer.textContent = `${m}:${s}`;
          }, 1000);
        }
    </script>
</body>
</html>
